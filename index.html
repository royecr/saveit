<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaveIt — הורדת סרטונים</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }

    /* ─── Dinosaur animation ─────────────────────────────── */
    .dino-wrap { position: relative; display: inline-block; }

    @keyframes dino-chomp {
      0%, 100% { transform: scale(1)    rotate(0deg);  }
      30%      { transform: scale(1.15) rotate(-8deg); }
      60%      { transform: scale(0.95) rotate(5deg);  }
    }
    @keyframes bit-fly-1 {
      0%   { opacity: 1; transform: translate(0, 0)    scale(1);   }
      100% { opacity: 0; transform: translate(-30px, -40px) scale(0); }
    }
    @keyframes bit-fly-2 {
      0%   { opacity: 1; transform: translate(0, 0)   scale(1);   }
      100% { opacity: 0; transform: translate(20px, -50px) scale(0); }
    }
    @keyframes bit-fly-3 {
      0%   { opacity: 1; transform: translate(0, 0)   scale(1);   }
      100% { opacity: 0; transform: translate(-10px, -55px) scale(0); }
    }
    @keyframes shadow-pulse {
      0%, 100% { transform: scaleX(1); opacity: 0.15; }
      25%       { transform: scaleX(0.7); opacity: 0.07; }
      50%       { transform: scaleX(1); opacity: 0.15; }
      75%       { transform: scaleX(0.85); opacity: 0.1; }
    }

    .dino          { font-size: 72px; animation: dino-chomp 0.45s ease-in-out infinite; display: block; line-height: 1; }
    .dino-shadow   { width: 60px; height: 8px; background: #000; border-radius: 50%; margin: 2px auto 0;
                     animation: shadow-pulse 0.45s ease-in-out infinite; }
    .bit           { position: absolute; font-size: 18px; pointer-events: none; }
    .bit-1         { top: 10px; right: -8px; animation: bit-fly-1 0.9s ease-out infinite; }
    .bit-2         { top: 20px; right:  4px; animation: bit-fly-2 0.9s ease-out infinite 0.3s; }
    .bit-3         { top:  4px; right:  8px; animation: bit-fly-3 0.9s ease-out infinite 0.6s; }

    /* ─── Dot loader ─────────────────────────────────────── */
    @keyframes dot-blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1); }
    }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
           background: #ef4444; margin: 0 3px;
           animation: dot-blink 1.4s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    /* ─── Format card hover ──────────────────────────────── */
    .format-card { transition: border-color 0.15s, background 0.15s, transform 0.1s; }
    .format-card:hover { border-color: #ef4444; background: #fff5f5; transform: translateX(-2px); }
    .format-card:active { transform: translateX(-1px); }

    /* ─── Fade in ────────────────────────────────────────── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fade-up 0.35s ease forwards; }
  </style>
</head>
<body class="bg-white min-h-screen flex flex-col">

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="border-b border-gray-100 px-6 py-4">
    <div class="max-w-2xl mx-auto flex items-center">
      <a href="#" onclick="resetAll(); return false;"
         class="text-xl font-bold text-gray-900 hover:text-gray-600 transition-colors">SaveIt</a>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────── -->
  <main class="flex-1 flex flex-col items-center justify-center px-4 py-8 sm:py-16">

    <!-- Hero -->
    <div class="text-center mb-10">
      <div class="text-5xl mb-4">⬇️</div>
      <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-2">הורד סרטונים</h1>
      <p class="text-gray-400 text-base">הדבק קישור ← בחר איכות ← הורד</p>
    </div>

    <!-- Platform sections -->
    <div class="w-full max-w-2xl space-y-4">

      <!-- YouTube -->
      <div class="border-2 border-gray-100 rounded-2xl p-4">
        <p class="text-xs font-semibold text-gray-400 text-right mb-2 tracking-wide">▶️ YouTube</p>
        <div class="flex gap-2">
          <input
            id="ytInput"
            type="text"
            dir="ltr"
            placeholder="https://www.youtube.com/watch?v=..."
            class="flex-1 border-2 border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-red-400 transition-all"
          />
          <button
            onclick="fetchInfo('ytInput')"
            class="bg-red-500 hover:bg-red-600 active:bg-red-700 text-white font-semibold px-4 sm:px-6 py-3 rounded-xl transition-colors whitespace-nowrap text-sm shadow-sm"
          >
            הורד ↓
          </button>
        </div>
      </div>

      <!-- Facebook + Instagram -->
      <div class="border-2 border-gray-100 rounded-2xl p-4">
        <p class="text-xs font-semibold text-gray-400 text-right mb-2 tracking-wide">📘 Facebook &nbsp;·&nbsp; 📸 Instagram</p>
        <div class="flex gap-2">
          <input
            id="fbInput"
            type="text"
            dir="ltr"
            placeholder="https://www.facebook.com/... או https://www.instagram.com/..."
            class="flex-1 border-2 border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-400 transition-all"
          />
          <button
            onclick="fetchInfn('fbInput')"
            class="bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white font-semibold px-4 sm:px-6 py-3 rounded-xl transition-colors whitespace-nowrap text-sm shadow-sm"
          >
            הורד ↓
          </button>
        </div>
      </div>

      <!-- TikTok -->
      <div class="border-2 border-gray-100 rounded-2xl p-4">
        <p class="text-xs font-semibold text-gray-400 text-right mb-2 tracking-wide">🎵 TikTok</p>
        <div class="flex gap-2">
          <input
            id="ttInput"
            type="text"
            dir="ltr"
            placeholder="https://www.tiktok.com/@user/video/..."
            class="flex-1 border-2 border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gray-400 transition-all"
          />
          <button
            onclick="fetchInfo('ttInput')"
            class="bg-gray-800 hover:bg-gray-900 active:bg-black text-white font-semibold px-4 sm:px-6 py-3 rounded-xl transition-colors whitespace-nowrap text-sm shadow-sm"
          >
            הורד ↓
          </button>
        </div>
      </div>

      <!-- Telegram -->
      <div class="border-2 border-gray-100 rounded-2xl p-4">
        <p class="text-xs font-semibold text-gray-400 text-right mb-2 tracking-wide">✈️ Telegram — כולל קבוצות פרטיות</p>
        <div class="flex gap-2">
          <input
            id="tgInput"
            type="text"
            dir="ltr"
            placeholder="https://t.me/channel/123 או https://t.me/c/..."
            class="flex-1 border-2 border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-400 transition-all"
          />
          <button
            onclick="downloadTelegram()"
            class="bg-indigo-500 hover:bg-indigo-600 active:bg-indigo-700 text-white font-semibold px-4 sm:px-6 py-3 rounded-xl transition-colors whitespace-nowrap text-sm shadow-sm"
          >
            הורד ↓
          </button>
        </div>
      </div>

      <p id="errorMsg" class="text-red-500 text-sm text-right hidden"></p>
    </div>

    <!-- ── Loading ─────────────────────────────────────── -->
    <div id="loadingState" class="hidden mt-14 text-center fade-up">
      <div class="dino-wrap mb-3">
        <span class="dino">🦕</span>
        <span class="bit bit-1">🎬</span>
        <span class="bit bit-2">✨</span>
        <span class="bit bit-3">🎥</span>
        <div class="dino-shadow"></div>
      </div>
      <p class="text-gray-700 font-medium mt-3">הדינוזאור אוכל את הסרטון שלך...</p>
      <p class="text-gray-400 text-sm mt-1">רק רגע, כמעט שם
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </p>
    </div>

    <!-- ── Result (YouTube / Facebook / Instagram / TikTok) ── -->
    <div id="resultState" class="hidden mt-8 w-full max-w-2xl fade-up">
      <div class="border border-gray-200 rounded-2xl overflow-hidden shadow-sm">

        <!-- Video info bar -->
        <div class="flex gap-4 p-4 bg-gray-50 border-b border-gray-100">
          <img id="thumbnail" src="" alt="thumbnail"
               class="w-24 sm:w-32 h-16 sm:h-20 object-cover rounded-lg flex-shrink-0 bg-gray-200" />
          <div class="flex-1 min-w-0 flex flex-col justify-center">
            <h3 id="videoTitle" class="font-semibold text-gray-900 text-right text-sm leading-snug line-clamp-2"></h3>
            <p id="videoChannel" class="text-gray-400 text-xs mt-1 text-right"></p>
            <p id="videoDuration" class="text-gray-400 text-xs mt-0.5 text-right"></p>
          </div>
        </div>

        <!-- Format options -->
        <div id="formatList" class="p-3 space-y-2"></div>
      </div>

      <button onclick="reset()"
              class="mt-4 text-sm text-gray-400 hover:text-gray-600 transition-colors w-full text-center">
        ← הורד סרטון אחר
      </button>
    </div>

  </main>

  <!-- ── Footer ─────────────────────────────────────────── -->
  <footer class="text-center py-4 text-xs text-gray-300">
    SaveIt · לשימוש אישי בלבד · כבד זכויות יוצרים
  </footer>

  <script>
    // ── Config ────────────────────────────────────────────
    const API = 'https://saveit-api-8vpy.onrender.com';

    // ── State ─────────────────────────────────────────────
    let savedUrl   = '';
    let savedTitle = '';

    // ── Helpers ───────────────────────────────────────────
    function show(id)  { document.getElementById(id).classList.remove('hidden'); }
    function hide(id)  { document.getElementById(id).classList.add('hidden'); }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function hideError() { document.getElementById('errorMsg').classList.add('hidden'); }

    function fmtSeconds(sec) {
      if (!sec) return '';
      const m = Math.floor(sec / 60), s = sec % 60;
      return `${m}:${String(s).padStart(2,'0')}`;
    }

    function reset() {
      hide('resultState');
      hide('loadingState');
      hideError();
      document.getElementById('ytInput').value = '';
      document.getElementById('fbInput').value = '';
      document.getElementById('ttInput').value = '';
      document.getElementById('tgInput').value = '';
    }

    function resetAll() { reset(); }

    // ── Main fetch (YouTube / Facebook / Instagram / TikTok) ──
    async function fetchInfo(inputId) {
      const url = document.getElementById(inputId).value.trim();
      if (!url) return;

      hideError();
      hide('resultState');
      show('loadingState');

      try {
        const res = await fetch(`${API}/api/info`, {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ url }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `שגיאה ${res.status}`);
        }

        const data = await res.json();
        savedUrl   = url;
        savedTitle = data.title;
        renderResult(data);

      } catch (e) {
        showError(e.message || 'אירעה שגיאה. נסה שוב.');
      } finally {
        hide('loadingState');
      }
    }

    // ── Telegram — הורדה ישירה (ללא בחירת איכות) ─────────
    function downloadTelegram() {
      const url = document.getElementById('tgInput').value.trim();
      if (!url) return;

      hideError();

      // מציגים הודעת המתנה
      const loadDiv = document.getElementById('loadingState');
      loadDiv.classList.remove('hidden');
      document.querySelector('#loadingState p.text-gray-700').textContent =
        'הדינוזאור מוריד מטלגרם...';
      document.querySelector('#loadingState p.text-gray-400').innerHTML =
        'יכול לקחת עד דקה — תלוי בגודל הקובץ <span class="dot"></span><span class="dot"></span><span class="dot"></span>';

      const downloadUrl = `${API}/api/telegram-download?url=${encodeURIComponent(url)}`;

      // window.location.href — הדפדפן עובר לכתובת ואז מוריד את הקובץ אוטומטית
      // הדף לא זזה אם השרת מחזיר Content-Disposition: attachment
      window.location.href = downloadUrl;

      // מסתירים את הטעינה אחרי 90 שניות (זמן מקסימלי סביר)
      setTimeout(() => hide('loadingState'), 90000);
    }

    // ── Quality presets ───────────────────────────────────
    const QUALITIES = [
      { quality: '360',  label: '360p',         sublabel: 'קובץ קטן · מהורדה מהירה',    icon: '📱', color: '#22c55e' },
      { quality: '480',  label: '480p',          sublabel: 'בינוני · מתאים לטלפון',      icon: '📺', color: '#eab308' },
      { quality: '720',  label: '720p HD',       sublabel: 'איכות גבוהה · הכי פופולרי', icon: '🖥️', color: '#f97316' },
      { quality: '1080', label: '1080p Full HD', sublabel: 'מעולה · קובץ גדול יותר',   icon: '⭐', color: '#ef4444' },
    ];

    // ── Render result ─────────────────────────────────────
    function renderResult(data) {
      document.getElementById('thumbnail').src     = data.thumbnail || '';
      document.getElementById('videoTitle').textContent   = data.title   || 'ללא כותרת';
      document.getElementById('videoChannel').textContent = data.channel ? `📺 ${data.channel}` : '';
      document.getElementById('videoDuration').textContent =
        data.duration ? `⏱ ${fmtSeconds(data.duration)}` : '';

      const list = document.getElementById('formatList');
      list.innerHTML = '';

      const title = document.createElement('p');
      title.className = 'text-xs text-gray-400 text-right mb-1 px-1';
      title.textContent = 'בחר איכות הורדה:';
      list.appendChild(title);

      QUALITIES.forEach(q => {
        list.appendChild(makeCard({
          label   : q.label,
          sublabel: q.sublabel,
          icon    : q.icon,
          color   : q.color,
          href    : `${API}/api/download?url=${encodeURIComponent(savedUrl)}&quality=${q.quality}&title=${encodeURIComponent(savedTitle)}`,
        }));
      });

      const div = document.createElement('div');
      div.className = 'border-t border-gray-100 my-2';
      list.appendChild(div);

      list.appendChild(makeCard({
        label   : 'MP3 — אודיו בלבד',
        sublabel: 'מוזיקה / פודקאסט · ללא וידאו',
        icon    : '🎵',
        color   : '#8b5cf6',
        href    : `${API}/api/download?url=${encodeURIComponent(savedUrl)}&quality=mp3&title=${encodeURIComponent(savedTitle)}`,
      }));

      show('resultState');
    }

    function makeCard({ label, sublabel, icon, href, color }) {
      const a = document.createElement('a');
      a.href = href;
      a.className = 'format-card flex items-center gap-3 p-3 border border-gray-200 rounded-xl cursor-pointer';
      a.innerHTML = `
        <span class="text-xl">${icon}</span>
        <div class="flex-1 text-right">
          <div class="font-semibold text-gray-800 text-sm">${label}</div>
          <div class="text-gray-400 text-xs">${sublabel}</div>
        </div>
        <span class="text-sm font-bold" style="color:${color}">הורד ↓</span>
      `;
      return a;
    }

    // ── Enter key ─────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('ytInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') fetchInfo('ytInput');
      });
      document.getElementById('fbInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') fetchInfo('fbInput');
      });
      document.getElementById('ttInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') fetchInfo('ttInput');
      });
      document.getElementById('tgInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') downloadTelegram();
      });
    });
  </script>
</body>
</html>
